<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple CRUD App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Item Management (CRUD)</h1>
        
        <!-- Form for Creating or Updating Items -->
        <div class="form-container">
            <h2 id="form-title">Add New Item</h2>
            <form id="item-form">
                <input type="hidden" id="item-id">
                <div class="form-group">
                    <label for="name">Name:</label>
                    <input type="text" id="name" required placeholder="Enter item name">
                </div>
                <div class="form-group">
                    <label for="description">Description:</label>
                    <textarea id="description" rows="3" placeholder="Enter item description"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" id="save-btn" class="btn btn-primary">Save</button>
                    <button type="button" id="cancel-btn" class="btn btn-secondary" style="display: none;">Cancel</button>
                </div>
            </form>
        </div>

        <!-- List that performs Read/Update/Delete -->
        <div class="list-container">
            <h2>Items List</h2>
            <table id="items-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="items-tbody">
                    <!-- Data will be populated here via JavaScript -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
